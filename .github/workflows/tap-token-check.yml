name: Tap token check

# Temporary: verifies TAP_TOKEN can write to homebrew-tap without writing
# anything. A PUT with a wrong sha returns 409 (conflict) when the token has
# contents:write, and 403/404 when it does not.

on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe contents write permission
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $TAP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/harshitsinghbhandari/homebrew-tap/contents/Formula/harness-convert.rb \
            -d '{"message":"permission probe (never lands)","content":"bm9vcAo=","sha":"0000000000000000000000000000000000000000"}')
          echo "HTTP $CODE"
          cat /tmp/resp.json
          test "$CODE" = "409"
